name: Release

on:
  workflow_dispatch:
    inputs:
      auto-bump:
        type: choice
        description: Auto bump package version
        default: "no"
        options:
          - "no"
          - "patch"
          - "minor"
      version:
        description: Release version (X.Y.Z), required if auto-bump is no
        required: false
        type: string
      notes:
        description: Optional one-line release notes
        required: false
        type: string
      dry_run:
        description: Preview release without mutating or publishing
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  auto-bump:
    runs-on: ubuntu-latest
    if: inputs.auto-bump != 'no'
    outputs:
      bumped_version: ${{ steps.bump.outputs.bumped_version }}
    steps:
      - uses: actions/checkout@v5
      - id: bump
        env:
          AUTO_BUMP: ${{ inputs.auto-bump }}
        run: |
          set -euo pipefail
          CURRENT_VERSION="$(node -p 'require("./package.json").version')"
          BUMPED_VERSION="$(
            node -e '
              const version = process.argv[1];
              const bump = process.argv[2];
              const parts = version.split(".").map(Number);

              if (parts.length !== 3 || !parts.every(Number.isInteger)) {
                throw new Error(`Invalid semver version: ${version}`);
              }

              const [major, minor, patch] = parts;
              let nextVersion;

              if (bump === "patch") {
                nextVersion = `${major}.${minor}.${patch + 1}`;
              } else if (bump === "minor") {
                nextVersion = `${major}.${minor + 1}.0`;
              } else {
                throw new Error(`Unsupported auto bump: ${bump}`);
              }

              console.log(nextVersion);
            ' "$CURRENT_VERSION" "$AUTO_BUMP"
          )"
          echo "bumped_version=${BUMPED_VERSION}" >> "$GITHUB_OUTPUT"

  ensure-version-not-exists:
    runs-on: ubuntu-latest
    needs: [auto-bump]
    if: ${{ !failure() }}
    outputs:
      final_version: ${{ steps.determine-version.outputs.final_version }}
    steps:
      - id: determine-version
        env:
          AUTO_BUMP_VERSION: ${{ needs.auto-bump.outputs.bumped_version }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${AUTO_BUMP_VERSION}" ]]; then
            echo "final_version=${AUTO_BUMP_VERSION}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            echo "final_version=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "Either auto-bump or version must be provided"
            exit 1
          fi
      - id: check-tag
        uses: mukunku/tag-exists-action@v1.7.0
        with:
          tag: v${{ steps.determine-version.outputs.final_version }}
      - name: Fail if tag already exists
        run: |
          set -euo pipefail
          if [[ "${{ steps.check-tag.outputs.exists }}" == "true" ]]; then
            echo "Version ${{ steps.determine-version.outputs.final_version }} already exists"
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ensure-version-not-exists]
    if: ${{ !failure() }}
    env:
      FINAL_VERSION: ${{ needs.ensure-version-not-exists.outputs.final_version }}
      RELEASE_NOTES: ${{ inputs.notes }}
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - name: Guard dispatch branch is main
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "This workflow must be dispatched from main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout main branch at dispatch SHA
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Create local main branch at dispatch SHA
        run: git checkout -B main "$GITHUB_SHA"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Assert current branch is main
        run: |
          set -euo pipefail
          CURRENT_BRANCH="$(git branch --show-current)"
          if [[ "${CURRENT_BRANCH}" != "main" ]]; then
            echo "Expected branch main, got: ${CURRENT_BRANCH}"
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update package version
        run: npm version "$FINAL_VERSION" --no-git-tag-version

      - name: Verify publish contents
        run: npm run verify:publish

      - name: Prepare release body
        run: |
          set -euo pipefail
          {
            echo "# just-loop ${FINAL_VERSION}"
            echo
            if [[ -n "${RELEASE_NOTES}" ]]; then
              echo "${RELEASE_NOTES}"
              echo
            fi
            echo "Published from commit ${GITHUB_SHA}."
          } > "$RUNNER_TEMP/release-body.md"

      - name: Upload release body artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-body-${{ env.FINAL_VERSION }}
          path: ${{ runner.temp }}/release-body.md
          if-no-files-found: error

      - name: Commit release version
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git add package.json bun.lock
          git commit -m "release: v${FINAL_VERSION}"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN
          npm config delete //registry.npmjs.org/:_authToken || true
          rm -f ~/.npmrc .npmrc || true
          npm publish --provenance --access public --registry=https://registry.npmjs.org/

      - name: Create release tag
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git tag "v${FINAL_VERSION}"

      - name: Push release commit
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git push origin HEAD:main

      - name: Push release tag
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git push origin "v${FINAL_VERSION}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "v${FINAL_VERSION}" --repo "${{ github.repository }}" --notes-file "$RUNNER_TEMP/release-body.md"
